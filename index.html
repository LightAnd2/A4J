  <!-- Enhanced index page styling -->
  <style>
    /* Modern index page with advanced animations */
    .hero {
      background: #000000;
      position: relative;
      overflow: hidden;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-bottom: 0;
      width: 100%;
    }
    
    .moving-bg {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: transparent;
      z-index: 1;
    }
    
    
    .overlay {
      position: relative;
      z-index: 2;
      text-align: center;
      animation: fadeInUp 1.5s ease-out;
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .brand-block {
      animation: slideInDown 1s ease-out 0.5s both;
    }
    
    @keyframes slideInDown {
      from {
        opacity: 0;
        transform: translateY(-50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .brand-block img {
      animation: bounceIn 1s ease-out 1s both;
      width: 170px;
      height: 170px;
      object-fit: cover;
      border-radius: 50%;
      border: 2px solid rgba(255, 215, 0, 0.4);
      display: block;
      margin: 0 auto 1rem;
    }
    
    @keyframes bounceIn {
      0% {
        opacity: 0;
        transform: scale(0.3) rotate(-180deg);
      }
      50% {
        opacity: 1;
        transform: scale(1.1) rotate(-10deg);
      }
      100% {
        opacity: 1;
        transform: scale(1) rotate(0deg);
      }
    }
    
    .brand-block h1 {
      background: linear-gradient(45deg, #ffd700, #ffed4e, #ffd700);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 3s ease-in-out infinite, glow 2s ease-in-out infinite alternate;
      font-size: clamp(3rem, 8vw, 5rem);
      font-weight: 800;
      margin: 1rem 0;
      text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
    }
    
    @keyframes glow {
      from { 
        text-shadow: 0 0 20px rgba(255, 215, 0, 0.5),
                     0 0 40px rgba(255, 215, 0, 0.3);
      }
      to { 
        text-shadow: 0 0 30px rgba(255, 215, 0, 0.8),
                     0 0 60px rgba(255, 215, 0, 0.5);
      }
    }
    
    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    
    .tagline {
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      color: white;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
      margin: 1rem 0 2rem;
      animation: slideInUp 1s ease-out 1.5s both;
      font-weight: 300;
      letter-spacing: 1px;
    }
    
    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .lang-buttons {
      animation: slideInUp 1s ease-out 2s both;
      display: flex;
      gap: 2rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    .lang-buttons .btn {
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      padding: 1rem 2.5rem;
      font-size: 1.05rem;
      font-weight: 700;
      border-radius: 8px;
      min-width: 200px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    
    .lang-buttons .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.6s;
    }
    
    .lang-buttons .btn:hover::before {
      left: 100%;
    }
    
    .lang-buttons .btn:hover {
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    }
    
    .lang-buttons .btn:active {
      transform: translateY(-2px) scale(1.02);
    }
    
    .btn.gold {
      background: linear-gradient(45deg, #ffd700, #ffed4e);
      color: #111;
      box-shadow: 0 8px 20px rgba(255, 215, 0, 0.3);
    }
    
    .btn.blue {
      background: linear-gradient(45deg, #ffd700, #ffed4e);
      color: #111;
      box-shadow: 0 8px 20px rgba(255, 215, 0, 0.3);
    }
    
    /* Floating elements */
    .floating-icon {
      position: absolute;
      opacity: 0.5;
      animation: float 6s ease-in-out infinite;
      pointer-events: none;
      z-index: 1;
    }
    
    .floating-icon img {
      width: 48px;
      height: 48px;
      display: block;
    }
    
    @keyframes float {
      0%, 100% { 
        transform: translateY(0px); 
      }
      50% { 
        transform: translateY(-20px); 
      }
    }
    
    /* Stagger the animation delays for variety */
    .floating-icon:nth-child(1) { animation-delay: 0s; }
    .floating-icon:nth-child(2) { animation-delay: 0.5s; }
    .floating-icon:nth-child(3) { animation-delay: 1s; }
    .floating-icon:nth-child(4) { animation-delay: 1.5s; }
    .floating-icon:nth-child(5) { animation-delay: 2s; }
    .floating-icon:nth-child(6) { animation-delay: 2.5s; }
    .floating-icon:nth-child(7) { animation-delay: 3s; }
    .floating-icon:nth-child(8) { animation-delay: 3.5s; }
    .floating-icon:nth-child(9) { animation-delay: 4s; }
    .floating-icon:nth-child(10) { animation-delay: 4.5s; }
    .floating-icon:nth-child(11) { animation-delay: 5s; }
    .floating-icon:nth-child(12) { animation-delay: 5.5s; }
    
    @media (max-width: 900px){

        font-weight: 600;
      }
    }
    
    /* Make hero fill entire screen and extend down */
    .hero {
      margin-bottom: 0;
      padding-bottom: 0;

    }

    }
    
    /* Ensure footer is always visible */
    .site-footer {
      flex-shrink: 0;
      margin-top: auto;
    }
